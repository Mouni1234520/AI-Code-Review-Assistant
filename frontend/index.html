<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <script>
      window.addEventListener('error', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100%';
        errDiv.style.height = '100%';
        errDiv.style.backgroundColor = '#1e293b';
        errDiv.style.color = '#fca5a5';
        errDiv.style.padding = '30px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.overflow = 'auto';
        errDiv.innerHTML = '<h1>🔴 Runtime JavaScript Error</h1>' +
          '<p><strong>Message:</strong> ' + event.message + '</p>' +
          '<p><strong>Source:</strong> ' + event.filename + ':' + event.lineno + ':' + event.colno + '</p>' +
          '<pre style="background:#0f172a; padding:15px; border-radius:8px; color:#e2e8f0; margin-top:20px; overflow-x:auto;">' + 
          (event.error ? event.error.stack : 'No stack trace available') + '</pre>';
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100%';
        errDiv.style.height = '100%';
        errDiv.style.backgroundColor = '#1e293b';
        errDiv.style.color = '#fca5a5';
        errDiv.style.padding = '30px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.overflow = 'auto';
        errDiv.innerHTML = '<h1>🔴 Unhandled Promise Rejection</h1>' +
          '<p><strong>Reason:</strong> ' + event.reason + '</p>' +
          '<pre style="background:#0f172a; padding:15px; border-radius:8px; color:#e2e8f0; margin-top:20px; overflow-x:auto;">' + 
          (event.reason && event.reason.stack ? event.reason.stack : 'No stack trace available') + '</pre>';
        document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
